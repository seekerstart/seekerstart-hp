name: Validate Site

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-site:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Regenerate SEO assets
        run: node scripts/generate-site-assets.mjs

      - name: Ensure generated files are committed
        run: git diff --exit-code

      - name: Run site audit
        run: node scripts/audit-site.mjs
