name: Update Poker Stats

on:
  schedule:
    # 毎週月曜 23:30 JST = 14:30 UTC
    - cron: '30 14 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no file writes)'
        required: false
        default: 'false'
        type: boolean
      verbose:
        description: 'Verbose output'
        required: false
        default: 'true'
        type: boolean
      skip_fetch:
        description: 'Skip DB fetch (use existing JSON)'
        required: false
        default: 'false'
        type: boolean

jobs:
  update-stats:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas psycopg2-binary

      - name: Fetch stats from Neon DB
        if: inputs.skip_fetch != 'true'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd ${{ github.workspace }}
          FETCH_ARGS="--data-dir data"
          if [ "${{ inputs.verbose }}" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            FETCH_ARGS="$FETCH_ARGS --verbose"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            FETCH_ARGS="$FETCH_ARGS --dry-run"
          fi
          python scripts/fetch_stats.py $FETCH_ARGS

      - name: Run stats calculation
        run: |
          cd ${{ github.workspace }}
          ARGS="--data-dir data --config-dir config"
          if [ "${{ inputs.verbose }}" = "true" ] || [ "${{ github.event_name }}" = "schedule" ]; then
            ARGS="$ARGS --verbose"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python scripts/main.py $ARGS

      - name: Check for changes
        id: git-check
        run: |
          git add -A
          git diff --cached --exit-code || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Create branch, commit, open PR, and merge
        if: steps.git-check.outputs.changes == 'true' && inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE=$(date -u +%y%m%d)
          BRANCH="ranking/${DATE}"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          git commit -m "ranking/${DATE}"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "ranking/${DATE}" \
            --body "GitHub Actions による自動更新" \
            --base main \
            --head "$BRANCH"
          gh pr merge "$BRANCH" --merge --delete-branch
